services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: vanilla
      POSTGRES_PASSWORD: vanilla_dev
      POSTGRES_DB: vanilla_backoffice
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vanilla -d vanilla_backoffice"]
      interval: 5s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
