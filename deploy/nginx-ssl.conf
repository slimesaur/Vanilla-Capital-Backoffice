# Use this AFTER certbot succeeds (HTTPS)
server {
    listen 80;
    server_name vanillacapital.com.br;
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name vanillacapital.com.br;

    ssl_certificate /etc/letsencrypt/live/vanillacapital.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vanillacapital.com.br/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
