# Deploy to AWS Lightsail on push to main
# Required secrets: DEPLOY_HOST, SSH_PRIVATE_KEY

name: Deploy to AWS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Lightsail
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/ubuntu/vanilla-backoffice || exit 1
            git pull
            npm install
            npx prisma generate
            npx prisma db push
            npm run build
            pm2 restart vanilla-backoffice
            pm2 status vanilla-backoffice
