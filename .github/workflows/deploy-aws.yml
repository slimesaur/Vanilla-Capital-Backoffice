# Deploy to AWS Lightsail on push to main
# Required secrets: DEPLOY_HOST, SSH_PRIVATE_KEY
#
# Build validates locally first - deploy only runs if build passes.
# Deploy script uses set -e so it stops on first failure; pm2 delete
# runs only after successful build, so a broken build never takes down the site.

name: Deploy to AWS

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Prisma generate
        run: npx prisma generate

      - name: Build
        run: npm run build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Lightsail
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /home/ubuntu/vanilla-backoffice || exit 1
            git fetch origin main && git reset --hard origin/main
            npm install
            npx prisma generate
            npx prisma db push
            npm run build
            pm2 delete vanilla-backoffice 2>/dev/null || true
            pm2 start npm --name "vanilla-backoffice" -- start
            pm2 save
            pm2 status vanilla-backoffice
